  <text x="70" y="205" fill="#00F0C2" font-family="Orbitron, Exo 2, Inter, Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="7">COMPTEXT AIR</text>
  <text x="300" y="205" fill="#8190A8" font-family="Inter, Arial, sans-serif" font-size="15">Replay beats trust. Evidence beats hidden reasoning.</text>
