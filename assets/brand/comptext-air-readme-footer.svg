<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="260" viewBox="0 0 1600 260" role="img" aria-label="CompText AIR README footer">
  <title>CompText AIR README footer</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#020713"/><stop offset="1" stop-color="#07051A"/></linearGradient>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#00F0C2"/><stop offset="0.5" stop-color="#00B8FF"/><stop offset="1" stop-color="#7A5CFF"/></linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse"><path d="M50 0H0V50" fill="none" stroke="#163653" stroke-width="1" opacity="0.22"/></pattern>
  </defs>
  <rect width="1600" height="260" fill="url(#bg)"/>
  <rect width="1600" height="260" fill="url(#grid)" opacity="0.18"/>
  <path d="M40 38H1560" stroke="url(#g)" stroke-width="2" opacity="0.55"/>
  <path d="M40 222H1560" stroke="#17314A" stroke-width="1" opacity="0.9"/>

  <g font-family="Exo 2, Inter, Arial, sans-serif" font-size="14" letter-spacing="3" font-weight="600">
    <g transform="translate(70 88)">
      <polygon points="0,26 26,10 52,26 52,58 26,74 0,58" fill="none" stroke="#00F0C2" stroke-width="2" filter="url(#glow)"/>
      <path d="M14 30 26 38 38 30M14 46 26 54 38 46" fill="none" stroke="#00F0C2" stroke-width="2"/>
      <text x="78" y="31" fill="#00F0C2">DETERMINISTIC EXECUTION</text>
      <text x="78" y="61" fill="#AEB8C8" font-size="16" letter-spacing="1" font-weight="400">Same input. Same outcome.</text>
    </g>
    <g transform="translate(385 88)">
      <polygon points="0,26 26,10 52,26 52,58 26,74 0,58" fill="none" stroke="#00B8FF" stroke-width="2" filter="url(#glow)"/>
      <path d="M12 35 26 27 40 35 26 43zM12 49 26 41 40 49 26 57z" fill="none" stroke="#00B8FF" stroke-width="2"/>
      <text x="78" y="31" fill="#00B8FF">PORTABLE BY DESIGN</text>
      <text x="78" y="61" fill="#AEB8C8" font-size="16" letter-spacing="1" font-weight="400">Run anywhere. Same guarantees.</text>
    </g>
    <g transform="translate(705 88)">
      <polygon points="0,26 26,10 52,26 52,58 26,74 0,58" fill="none" stroke="#4D7CFF" stroke-width="2" filter="url(#glow)"/>
      <path d="M26 25 40 32v17c0 10-6 18-14 22-8-4-14-12-14-22V32z" fill="none" stroke="#4D7CFF" stroke-width="2"/>
      <text x="78" y="31" fill="#4D7CFF">VERIFIABLE EVIDENCE</text>
      <text x="78" y="61" fill="#AEB8C8" font-size="16" letter-spacing="1" font-weight="400">Prove every step.</text>
    </g>
    <g transform="translate(1020 88)">
      <polygon points="0,26 26,10 52,26 52,58 26,74 0,58" fill="none" stroke="#7A5CFF" stroke-width="2" filter="url(#glow)"/>
      <circle cx="26" cy="42" r="4" fill="#7A5CFF"/><circle cx="15" cy="31" r="4" fill="#7A5CFF"/><circle cx="37" cy="54" r="4" fill="#7A5CFF"/><path d="M18 34 24 40M29 45 35 51" stroke="#7A5CFF" stroke-width="2"/>
      <text x="78" y="31" fill="#7A5CFF">AGENT ORCHESTRATION</text>
      <text x="78" y="61" fill="#AEB8C8" font-size="16" letter-spacing="1" font-weight="400">Compose. Delegate. Coordinate.</text>
