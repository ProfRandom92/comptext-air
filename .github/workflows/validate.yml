name: validate

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - name: Validate JSON syntax
        run: python scripts/validate_json.py
      - name: Validate AIR Fixtures
        run: python scripts/validate_air_fixtures.py
      - name: Validate Evidence Fixtures
        run: python scripts/validate_evidence_fixtures.py
      - name: Validate Replay Contracts
        run: python scripts/validate_replay_contracts.py
      - name: Validate Adapter Fixtures
        run: python scripts/validate_adapter_fixtures.py
